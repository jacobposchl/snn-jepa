# Paths (data_path must point to a Parquet from the dataset pipeline)
data_path:
results_out_path:
plots_out_path:

# Data split sizes (by session_id)
data:
  train_split: 0.7
  test_split: 0.15
  val_split: 0.15
  random_state: 42

# Model config (encoder + predictor share d_model)
model_config:
  # --- Encoder ---
  encoder_type: perceiver
  d_model: 256           # embedding and latent dimension
  n_latents: 64          # number of latent slots (L)
  max_time_ms: 400       # time embedding vocab size; must match window_size_ms
  n_cross_attn_heads: 4
  n_self_attn_layers: 4
  n_self_attn_heads: 8
  dim_feedforward: 1024
  dropout: 0.1

  # --- Predictor (intentionally narrower than encoder) ---
  predictor_type: transformer
  predictor_n_layers: 2         # encoder has 4
  predictor_n_heads: 4          # encoder has 8
  predictor_dim_feedforward: 512  # encoder uses 1024

# Training config
training_config:
  epochs: 100
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 0.05
  ema_momentum: 0.996   # target encoder EMA decay; higher = slower update
  mask_ratio: 0.5       # fraction of real tokens hidden from context encoder
  lambd: 0.05           # weight of SIGReg term relative to prediction loss
  num_slices: 256       # number of random projections for SIGReg
