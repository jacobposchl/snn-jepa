
# JEPA-NoReg: identical to lejepa_visual_cortex.yaml in every way except
# the regularizer is zeroed out (reg_type: no_reg, lambd: 0.0).
# The EMA target encoder remains active — this is not MAE; it is the same
# JEPA architecture with the regularization term removed.

data_path: ../../../datasets/vis_all_animals_dataset.parquet
results_out_path: ../../../results/ablation_no_reg
plots_out_path: ../../../plots/ablation_no_reg

# Data split sizes (by session_id)
data:
  train_split: 0.7
  test_split: 0.15
  val_split: 0.15
  random_state: 42

# Model config (identical to lejepa_visual_cortex.yaml)
model_config:
  # --- Encoder ---
  encoder_type: perceiver
  d_model: 256
  n_latents: 64
  window_size_s: 0.4
  n_cross_attn_heads: 4
  n_self_attn_layers: 4
  n_self_attn_heads: 8
  dim_feedforward: 1024
  dropout: 0.1

  # --- POYO RoPE & token settings ---
  rope_t_min: 1.0e-3
  rope_t_max: 4.0
  use_delimiter_tokens: true

  # --- Predictor (intentionally narrower than encoder) ---
  predictor_type: transformer
  predictor_n_layers: 2
  predictor_n_heads: 4
  predictor_dim_feedforward: 512

# Training config (identical to lejepa_visual_cortex.yaml except reg_type and lambd)
training_config:
  epochs: 100
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 0.05
  ema_momentum: 0.996
  mask_ratio: 0.5
  reg_type: "no_reg"
  lambd: 0.0
  unit_dropout: 0.4
  unit_id_steps: 200
  unit_id_lr: 1.0e-4
